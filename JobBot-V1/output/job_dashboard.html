        function applyFilters() {
            filteredJobs = allJobs.filter(job => {
                // Priority filter
                if (currentFilters.priority !== 'all') {
                    if (currentFilters.priority === 'PREMIUM') {
                        if (job.score < 86) return false;
                    } else if (currentFilters.priority === 'STARRED') {
                        if (!job.starred) return false;
                    } else if (job.priority !== currentFilters.priority) {
                        return false;
                    }
                }
                
                // Source filter
                if (currentFilters.source !== 'all' && job.source !== currentFilters.source) {
                    return false;
                }
                
                // Remote filter
                if (currentFilters.remote !== 'all') {
                    const isRemote = job.remote_friendly;
                    if (currentFilters.remote === 'true' && !isRemote) return false;
                    if (currentFilters.remote === 'false' && isRemote) return false;
                }
                
                // Search filter
                if (currentFilters.search) {
                    const searchText = `${job.title} ${job.company} ${job.location} ${job.description} ${job.starred_notes || ''}`.toLowerCase();
                    if (!searchText.includes(currentFilters.search)) return false;
                }
                
                return true;
            });

        // PAGINATION FUNCTIONALITY
        
        let currentPage = 1;
        let totalPages = 1;
        let pageSize = 20;
        let isLoading = false;
        
        async function loadJobsPage(page = 1, updateHistory = true) {
            if (isLoading) return;
            
            isLoading = true;
            showPaginationLoading();
            
            try {
                // Build query parameters
                const params = new URLSearchParams({
                    page_size: pageSize
                });
                
                // Add filters
                if (currentFilters.priority !== 'all') {
                    params.append('priority', currentFilters.priority);
                }
                if (currentFilters.source !== 'all') {
                    params.append('source', currentFilters.source);
                }
                if (currentFilters.remote !== 'all') {
                    params.append('remote', currentFilters.remote);
                }
                if (currentFilters.search) {
                    params.append('search', currentFilters.search);
                }
                
                const response = await fetch(`/api/jobs/page/${page}?${params}`);
                const result = await response.json();
                
                if (result.success) {
                    // Update global state
                    currentPage = result.pagination.current_page;
                    totalPages = result.pagination.total_pages;
                    
                    // Update jobs display
                    allJobs = result.jobs;
                    filteredJobs = [...allJobs];
                    renderJobs();
                    
                    // Update pagination controls
                    updatePaginationControls(result.pagination);
                    updateResultsCount(result.pagination);
                    
                    // Update URL if requested
                    if (updateHistory && 'URLSearchParams' in window) {
                        const url = new URL(window.location);
                        url.searchParams.set('page', page);
                        window.history.pushState({page: page}, '', url);
                    }
                    
                } else {
                    showNotification('❌ Failed to load jobs page', 'error');
                }
                
            } catch (error) {
                console.error('Error loading jobs page:', error);
                showNotification('❌ Error loading jobs page', 'error');
            } finally {
                isLoading = false;
                hidePaginationLoading();
            }
        }
        
        function updatePaginationControls(pagination) {
            // Show pagination controls
            document.getElementById('paginationControls').style.display = 'flex';
            
            // Update button states
            document.getElementById('firstPageBtn').disabled = !pagination.has_previous;
            document.getElementById('prevPageBtn').disabled = !pagination.has_previous;
            document.getElementById('nextPageBtn').disabled = !pagination.has_next;
            document.getElementById('lastPageBtn').disabled = !pagination.has_next;
            
            // Update page numbers
            updatePageNumbers(pagination);
        }
        
        function updatePageNumbers(pagination) {
            const pageNumbersContainer = document.getElementById('pageNumbers');
            pageNumbersContainer.innerHTML = '';
            
            const current = pagination.current_page;
            const total = pagination.total_pages;
            
            // Always show first page
            if (total > 1) {
                addPageNumber(pageNumbersContainer, 1, current);
            }
            
            // Add ellipsis if needed
            if (current > 4) {
                addEllipsis(pageNumbersContainer);
            }
            
            // Add pages around current
            const start = Math.max(2, current - 2);
            const end = Math.min(total - 1, current + 2);
            
            for (let i = start; i <= end; i++) {
                if (i !== 1 && i !== total) {
                    addPageNumber(pageNumbersContainer, i, current);
                }
            }
            
            // Add ellipsis if needed
            if (current < total - 3) {
                addEllipsis(pageNumbersContainer);
            }
            
            // Always show last page
            if (total > 1) {
                addPageNumber(pageNumbersContainer, total, current);
            }
        }
        
        function addPageNumber(container, pageNum, currentPage) {
            const pageElement = document.createElement('div');
            pageElement.className = pageNum === currentPage ? 'page-number current' : 'page-number';
            pageElement.textContent = pageNum;
            pageElement.onclick = () => goToPage(pageNum);
            container.appendChild(pageElement);
        }
        
        function addEllipsis(container) {
            const ellipsis = document.createElement('div');
            ellipsis.className = 'page-ellipsis';
            ellipsis.textContent = '...';
            container.appendChild(ellipsis);
        }
        
        function goToPage(page) {
            if (page === 'last') {
                page = totalPages;
            }
            if (page >= 1 && page <= totalPages && page !== currentPage) {
                loadJobsPage(page);
            }
        }
        
        function goToNextPage() {
            if (currentPage < totalPages) {
                loadJobsPage(currentPage + 1);
            }
        }
        
        function goToPreviousPage() {
            if (currentPage > 1) {
                loadJobsPage(currentPage - 1);
            }
        }
        
        function updatePageSize(newSize) {
            pageSize = parseInt(newSize);
            currentPage = 1; // Reset to first page
            loadJobsPage(1);
        }
        
        function showPaginationLoading() {
            const container = document.getElementById('jobs-container');
            container.innerHTML = '<div class="loading-pagination">Loading jobs...</div>';
        }
        
        function hidePaginationLoading() {
            // Loading will be hidden when renderJobs() is called
        }
        
        function updateResultsCount(pagination) {
            const resultsText = `Showing ${pagination.start_index + 1}-${pagination.end_index} of ${pagination.total_items} jobs (Page ${pagination.current_page} of ${pagination.total_pages})`;
            document.getElementById('resultsCount').textContent = resultsText;
        }
        
        // Override the original filter functions to work with pagination
        function filterByPriority(priority) {
            currentFilters.priority = priority;
            currentPage = 1; // Reset to first page when filtering
            loadJobsPage(1);
            
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }
        
        function filterBySource(source) {
            currentFilters.source = source;
            currentPage = 1;
            loadJobsPage(1);
        }
        
        function filterByRemote(remote) {
            currentFilters.remote = remote;
            currentPage = 1;
            loadJobsPage(1);
        }
        
        function searchJobs() {
            currentFilters.search = document.getElementById('searchBox').value.toLowerCase();
            currentPage = 1;
            loadJobsPage(1);
        }
        
        function clearAllFilters() {
            currentFilters = {
                priority: 'all',
                source: 'all',
                remote: 'all',
                search: ''
            };
            
            document.getElementById('sourceFilter').value = 'all';
            document.getElementById('remoteFilter').value = 'all';
            document.getElementById('searchBox').value = '';
            
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector('.filter-btn').classList.add('active');
            
            currentPage = 1;
            loadJobsPage(1);
        }
        
        // Override the original loadJobsData to use pagination
        async function loadJobsData() {
            try {
                console.log('Loading jobs with pagination...');
                
                // Check if we have URL parameters for page
                const urlParams = new URLSearchParams(window.location.search);
                const urlPage = parseInt(urlParams.get('page')) || 1;
                
                // Load the first page
                await loadJobsPage(urlPage, false);
                
                document.getElementById('loading').style.display = 'none';
            } catch (error) {
                console.error('Error loading jobs data:', error);
                document.getElementById('loading').innerHTML = '❌ Error loading jobs data. Make sure you generated the dashboard first.';
            }
        }
        
        // Handle browser back/forward buttons
        window.addEventListener('popstate', function(event) {
            if (event.state && event.state.page) {
                loadJobsPage(event.state.page, false);
            }
        });
        
    </script>
</body>
</html>
